name: Enshan Forum Auto Checkin

on:
  workflow_dispatch:
  schedule:
    - cron: '35 0 * * *'

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3
      
      - name: Replace Config Placeholders
        env:
          ENSHAN_COOKIE: ${{ secrets.ENSHAN_COOKIE }}
          BARK_URL: ${{ secrets.BARK_URL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_USERID: ${{ secrets.TELEGRAM_USERID }}
        run: |
          sed -i "s@{{ENSHAN_COOKIE}}@${ENSHAN_COOKIE:-}@g" ./config.json
          sed -i "s@{{BARK_URL}}@${BARK_URL:-}@g" ./config.json
          sed -i "s@{{TELEGRAM_TOKEN}}@${TELEGRAM_TOKEN:-}@g" ./config.json
          sed -i "s@{{TELEGRAM_USERID}}@${TELEGRAM_USERID:-}@g" ./config.json
          echo "📝 替换后的配置文件（脱敏）："
          cat ./config.json | grep -v "cookie"

      - name: Run Enshan Checkin
        run: |
          echo "🔄 开始恩山签到..."
          python main.py --include ENSHAN 2>&1 | tee enshan_checkin.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ 签到脚本执行失败！"
            exit 1
          fi

          
          
          # 执行变量替换（解析命令替换）
          FAIL_MSG=$(eval "cat <<'EVAL_EOF'\n$FAIL_MSG\nEVAL_EOF")
          
          
